<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำนวณไทยช่วยไทย+</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🧮 คำนวณไทยช่วยไทยพลัส</h1>
        <p class="subtitle">รัฐจ่าย 60% | คุณจ่าย 40% | วงเงินสูงสุด 200 บาท/วัน</p>

        <!-- กล่องที่ 1 -->
        <div class="card">
            <h2>ของราคาเท่าไหร่ ต้องจ่ายเองเท่าไหร่?</h2>
            <label>ราคาสินค้า (บาท)</label>
            <input type="number" id="price1" placeholder="เช่น 500" min="0">
            <button onclick="calc1()">คำนวณ</button>
            <div id="result1" class="result"></div>
        </div>

        <!-- กล่องที่ 2 -->
        <div class="card">
            <h2>ต้องเติมเงินเท่าไหร่ให้พอดีกับสิทธิรัฐ?</h2>
            <label>มูลค่าสิทธิคงเหลือ (บาท)</label>
            <input type="number" id="price2" placeholder="เช่น 300" min="0">
            <button onclick="calc2()">คำนวณ</button>
            <div id="result2" class="result"></div>
        </div>

        <!-- กล่องที่ 3 -->
        <div class="card">
            <h2>คำนวนยอดรวมที่สามารถใช้ได้วันนี้</h2>
            <label>มูลค่าสิทธิคงเหลือ (บาท)</label>
            <input type="number" id="price3" placeholder="เช่น 200" min="0">
            <button onclick="calc3()">คำนวณ</button>
            <div id="result3" class="result"></div>
        </div>

        <!-- กล่องที่ 4 -->
        <div class="card">
            <h2>ของแพงเกิน 200 บาท ต้องออกเองเพิ่มเท่าไหร่?</h2>
            <label>ราคาสินค้า (บาท)</label>
            <input type="number" id="price4" placeholder="เช่น 700" min="0">
            <button onclick="calc4()">คำนวณ</button>
            <div id="result4" class="result"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
